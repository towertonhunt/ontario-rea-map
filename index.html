<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ontario Renewable Energy Approvals</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet.markercluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    #header {
      background: #1a3a5c;
      color: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 1000;
    }
    #header h1 { font-size: 1rem; font-weight: 600; white-space: nowrap; }
    #header .subtitle { font-size: 0.75rem; opacity: 0.7; }

    /* ── Filter bar ── */
    #filters {
      background: #f0f4f8;
      border-bottom: 1px solid #d0d7de;
      padding: 8px 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    #filters label { font-size: 0.78rem; color: #555; font-weight: 500; }
    #filters select, #filters input[type=text] {
      font-size: 0.78rem;
      padding: 4px 8px;
      border: 1px solid #c0c8d0;
      border-radius: 4px;
      background: white;
    }
    .filter-group { display: flex; align-items: center; gap: 5px; }
    #count-badge {
      margin-left: auto;
      font-size: 0.75rem;
      background: #1a3a5c;
      color: white;
      padding: 3px 9px;
      border-radius: 10px;
    }

    /* ── Main layout ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Sidebar ── */
    #sidebar {
      width: 380px;
      min-width: 320px;
      background: white;
      border-left: 1px solid #d0d7de;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s;
    }
    #sidebar.hidden { width: 0; min-width: 0; }

    #sidebar-header {
      background: #1a3a5c;
      color: white;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      flex-shrink: 0;
    }
    #sidebar-header h2 { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
    #sidebar-close {
      background: none; border: none; color: white; font-size: 1.2rem;
      cursor: pointer; padding: 0; flex-shrink: 0; line-height: 1;
    }

    #sidebar-meta {
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
      font-size: 0.8rem;
    }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
    .meta-item label { color: #888; font-size: 0.72rem; display: block; text-transform: uppercase; letter-spacing: 0.03em; }
    .meta-item span { font-weight: 500; color: #222; }

    /* Type badge */
    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .type-wind    { background: #dbeafe; color: #1e40af; }
    .type-solar   { background: #fef3c7; color: #92400e; }
    .type-biogas  { background: #dcfce7; color: #166534; }

    /* Doc sections */
    #doc-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
    }
    .doc-section { margin-bottom: 12px; }
    .doc-section-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      margin-bottom: 5px;
      padding-bottom: 3px;
      border-bottom: 1px solid #eee;
    }
    .doc-link {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 4px 0;
      font-size: 0.8rem;
      color: #1a3a5c;
      text-decoration: none;
      line-height: 1.3;
    }
    .doc-link:hover { color: #2563eb; }
    .doc-link::before { content: "📄"; flex-shrink: 0; font-size: 0.85rem; }
    .no-docs { font-size: 0.82rem; color: #888; font-style: italic; padding: 8px 0; }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 28px;
      left: 12px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.78rem;
      z-index: 999;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    #legend h4 { font-size: 0.75rem; margin-bottom: 7px; color: #444; }
    .legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.3); flex-shrink: 0; }

    /* Responsive */
    @media (max-width: 700px) {
      #sidebar { position: absolute; right: 0; top: 0; bottom: 0; z-index: 800; width: 100% !important; }
      #sidebar.hidden { width: 0 !important; }
    }
  </style>
</head>
<body>

<div id="header">
  <div>
    <h1>Ontario Renewable Energy Approvals</h1>
    <div class="subtitle">REA Project Document Library</div>
  </div>
</div>

<div id="filters">
  <div class="filter-group">
    <label for="filter-type">Type</label>
    <select id="filter-type">
      <option value="">All</option>
      <option value="wind">Wind</option>
      <option value="solar">Solar</option>
      <option value="biogas">Biogas</option>
    </select>
  </div>
  <div class="filter-group">
    <label for="filter-year-min">Year</label>
    <select id="filter-year-min">
      <option value="">From</option>
    </select>
    <span style="font-size:0.8rem;color:#888">–</span>
    <select id="filter-year-max">
      <option value="">To</option>
    </select>
  </div>
  <div class="filter-group">
    <label for="filter-docs">Docs</label>
    <select id="filter-docs">
      <option value="">All projects</option>
      <option value="tech">Technical docs only</option>
      <option value="approval">Approval only</option>
    </select>
  </div>
  <div class="filter-group">
    <label for="filter-search">Search</label>
    <input type="text" id="filter-search" placeholder="Project or proponent…" style="width:170px" />
  </div>
  <span id="count-badge">– projects</span>
</div>

<div id="main">
  <div id="map"></div>

  <div id="sidebar" class="hidden">
    <div id="sidebar-header">
      <h2 id="sidebar-title">Select a project</h2>
      <button id="sidebar-close" title="Close">✕</button>
    </div>
    <div id="sidebar-meta"></div>
    <div id="doc-list"></div>
  </div>
</div>

<!-- Legend (inside map div so it floats over) -->
<div id="legend">
  <h4>Project Type</h4>
  <div class="legend-row"><div class="legend-dot" style="background:#3b82f6"></div> Wind</div>
  <div class="legend-row"><div class="legend-dot" style="background:#f59e0b"></div> Solar</div>
  <div class="legend-row"><div class="legend-dot" style="background:#22c55e"></div> Biogas</div>
  <div class="legend-row" style="margin-top:6px;border-top:1px solid #eee;padding-top:6px">
    <div class="legend-dot" style="background:#6366f1"></div> Full tech docs
  </div>
  <div class="legend-row"><div class="legend-dot" style="background:#94a3b8"></div> Approval only</div>
</div>

<script>
// ── Map setup ──────────────────────────────────────────────────────────────
const map = L.map("map", {
  center: [44.5, -79.5],
  zoom: 7,
  zoomControl: true,
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

// ── Marker colours ─────────────────────────────────────────────────────────
const COLOURS = {
  wind_tech:    "#3b82f6",  // blue  — wind, has tech docs
  wind_appr:    "#93c5fd",  // light blue — wind, approval only
  solar_tech:   "#f59e0b",  // amber — solar, has tech docs
  solar_appr:   "#fcd34d",  // light amber
  biogas_tech:  "#22c55e",  // green
  biogas_appr:  "#86efac",
};

function markerColour(f) {
  const t = f.properties.type || "other";
  const has = f.properties.has_tech_docs;
  if (t === "wind")   return has ? COLOURS.wind_tech   : COLOURS.wind_appr;
  if (t === "solar")  return has ? COLOURS.solar_tech  : COLOURS.solar_appr;
  if (t === "biogas") return has ? COLOURS.biogas_tech : COLOURS.biogas_appr;
  return "#94a3b8";
}

function makeIcon(colour) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
    <circle cx="8" cy="8" r="7" fill="${colour}" stroke="white" stroke-width="2"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: "",
    iconSize: [16, 16],
    iconAnchor: [8, 8],
    popupAnchor: [0, -10],
  });
}

// ── Cluster group ──────────────────────────────────────────────────────────
const cluster = L.markerClusterGroup({
  maxClusterRadius: 40,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  iconCreateFunction(c) {
    const n = c.getChildCount();
    const size = n > 50 ? 44 : n > 20 ? 38 : 32;
    return L.divIcon({
      html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#1a3a5c;color:white;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3)">${n}</div>`,
      className: "",
      iconSize: [size, size],
      iconAnchor: [size/2, size/2],
    });
  },
});
map.addLayer(cluster);

// ── Sidebar logic ──────────────────────────────────────────────────────────
const sidebar      = document.getElementById("sidebar");
const sidebarTitle = document.getElementById("sidebar-title");
const sidebarMeta  = document.getElementById("sidebar-meta");
const docList      = document.getElementById("doc-list");

document.getElementById("sidebar-close").addEventListener("click", () => {
  sidebar.classList.add("hidden");
  if (activeMarker) { activeMarker.setIcon(makeIcon(markerColour(activeMarker.feature))); activeMarker = null; }
});

let activeMarker = null;

function openSidebar(feature, marker) {
  const p = feature.properties;

  // Reset previous active marker
  if (activeMarker && activeMarker !== marker) {
    activeMarker.setIcon(makeIcon(markerColour(activeMarker.feature)));
  }
  activeMarker = marker;
  marker.setIcon(makeIcon("#7c3aed"));  // purple = selected

  sidebarTitle.textContent = p.name;
  sidebar.classList.remove("hidden");

  // Meta section
  const typeClass = `type-${p.type || "other"}`;
  const cap = p.capacity_mw ? `${p.capacity_mw} MW` : "—";
  const turbines = p.num_turbines ? ` · ${p.num_turbines} turbines` : "";
  const panels   = p.num_panels   ? ` · ${p.num_panels} panels`   : "";
  const location = [p.municipality, p.county].filter(Boolean).join(", ") || "—";

  sidebarMeta.innerHTML = `
    <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px">
      <span class="type-badge ${typeClass}">${p.type || "—"}</span>
      ${p.procurement ? `<span style="font-size:0.72rem;color:#666">${p.procurement}</span>` : ""}
    </div>
    <div class="meta-grid">
      <div class="meta-item"><label>Proponent</label><span>${p.proponent || "—"}</span></div>
      <div class="meta-item"><label>Capacity</label><span>${cap}${turbines}${panels}</span></div>
      <div class="meta-item"><label>Approved</label><span>${p.approval_date || "—"}</span></div>
      <div class="meta-item"><label>Location</label><span>${location}</span></div>
      <div class="meta-item"><label>REA Number</label><span style="font-size:0.72rem">${p.rea_number || "—"}</span></div>
      <div class="meta-item"><label>Documents</label><span>${p.doc_count} total</span></div>
    </div>`;

  // Document sections
  docList.innerHTML = "";
  if (!p.doc_sections || p.doc_sections.length === 0) {
    docList.innerHTML = `<p class="no-docs">No documents found for this project.</p>`;
    return;
  }

  for (const section of p.doc_sections) {
    const sec = document.createElement("div");
    sec.className = "doc-section";
    sec.innerHTML = `<div class="doc-section-title">${section.label} (${section.docs.length})</div>`;

    for (const doc of section.docs) {
      const a = document.createElement("a");
      a.className = "doc-link";
      a.href = doc.url;
      a.target = "_blank";
      a.rel = "noopener";
      // Truncate long titles
      const title = doc.title && doc.title.length > 80
        ? doc.title.substring(0, 78) + "…"
        : (doc.title || doc.label);
      a.textContent = title;
      sec.appendChild(a);
    }
    docList.appendChild(sec);
  }
}

// ── Load GeoJSON ───────────────────────────────────────────────────────────
let allFeatures = [];
let allMarkers  = [];  // parallel array to allFeatures

fetch("projects.geojson")
  .then(r => r.json())
  .then(data => {
    allFeatures = data.features;
    buildYearFilters();
    applyFilters();
  })
  .catch(err => console.error("Failed to load GeoJSON:", err));

function buildYearFilters() {
  const years = [...new Set(allFeatures.map(f => f.properties.approval_year).filter(Boolean))].sort();
  const minSel = document.getElementById("filter-year-min");
  const maxSel = document.getElementById("filter-year-max");
  years.forEach(y => {
    minSel.add(new Option(y, y));
    maxSel.add(new Option(y, y));
  });
}

function applyFilters() {
  const typeVal   = document.getElementById("filter-type").value;
  const yearMin   = parseInt(document.getElementById("filter-year-min").value) || 0;
  const yearMax   = parseInt(document.getElementById("filter-year-max").value) || 9999;
  const docsVal   = document.getElementById("filter-docs").value;
  const search    = document.getElementById("filter-search").value.trim().toLowerCase();

  const filtered = allFeatures.filter(f => {
    const p = f.properties;
    if (typeVal && p.type !== typeVal) return false;
    if (yearMin && (p.approval_year || 0) < yearMin) return false;
    if (yearMax < 9999 && (p.approval_year || 0) > yearMax) return false;
    if (docsVal === "tech"     && !p.has_tech_docs) return false;
    if (docsVal === "approval" &&  p.has_tech_docs) return false;
    if (search) {
      const haystack = `${p.name} ${p.proponent} ${p.municipality} ${p.county}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  // Rebuild cluster layer
  cluster.clearLayers();
  allMarkers = [];

  filtered.forEach(feature => {
    const [lng, lat] = feature.geometry.coordinates;
    const marker = L.marker([lat, lng], { icon: makeIcon(markerColour(feature)) });
    marker.feature = feature;
    marker.on("click", () => openSidebar(feature, marker));
    allMarkers.push(marker);
    cluster.addLayer(marker);
  });

  document.getElementById("count-badge").textContent = `${filtered.length} project${filtered.length !== 1 ? "s" : ""}`;
}

// Wire up filter controls
["filter-type","filter-year-min","filter-year-max","filter-docs"].forEach(id => {
  document.getElementById(id).addEventListener("change", applyFilters);
});
let searchTimeout;
document.getElementById("filter-search").addEventListener("input", () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(applyFilters, 300);
});
</script>
</body>
</html>
